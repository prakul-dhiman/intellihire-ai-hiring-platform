services:
  - type: web
    name: intellihire-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://intellihire-client-chi.vercel.app
      # Set these in Render dashboard (keep secret):
      # MONGO_URI
      # JWT_SECRET
      # EMAIL_USER
      # EMAIL_PASS
      # JUDGE0_API_KEY
      # GEMINI_API_KEY
